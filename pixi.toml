[workspace]
authors = ["Aarash Zakeri <izear21@gmail.com>"]
channels = ["conda-forge"]
name = "totally-not-a-bot"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
format = { cmd = [
    "ruff",
    "check",
    "--select",
    "I",
    "--fix",
    "&&",
    "ruff",
    "format",
    "--config",
    ".ruff.toml",
    "./"
]}
mcp = { cmd = [
    "python",
    "src/mcp/server.py",
    "--no-agent"
] }
bot = { cmd = [
    "python",
    "src/mcp/server.py",
    "--no-mcp"
] }
testscript = { cmd = [
    "python",
    "scripts/tests.py"
]}

[dependencies]
fastmcp = ">=3.2.4,<4"
"discord.py" = ">=2.3.2,<3"
pydantic = ">=2.13.3,<3"
ruff = ">=0.15.11,<0.16"
python = "3.12.*"
loguru = ">=0.7.3,<0.8"
pytest = ">=9.0.3,<10"
pytest-asyncio = ">=1.3.0,<2"
pytest-mock = ">=3.15.1,<4"
langchain = ">=1.3.14,<2"
deepagents = ">=0.6.12,<0.7"
chromadb = ">=1.5.9,<2"
langchain-mcp-adapters = ">=0.1.0,<1.0"
